name: Doris
options:
  bundleIdPrefix: com.gavin.doris
  deploymentTarget:
    macOS: "14.0"
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "$(DORIS_TEAM_ID)"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    # Strip the source-tree absolute path out of debug info. Without
    # this, every Debug build embeds full paths like
    # "/Users/.../work/khan/.claude/worktrees/.../File.swift" in the
    # DWARF symbols inside `.debug.dylib`. The "khan" in the worktree
    # path was leaking into the shipped binary even though no code
    # references it.
    #
    # Pass via `-Xfrontend` because the Swift driver's surface flag
    # changed shape between toolchain versions; the frontend flag is
    # the stable form. `-file-prefix-map` covers source filename
    # references that show up in __cstring (force-unwrap traps,
    # Bundle.module, etc.); `-debug-prefix-map` covers DWARF.
    OTHER_SWIFT_FLAGS: $(inherited) -Xfrontend -debug-prefix-map -Xfrontend $(SRCROOT)=/doris -Xfrontend -file-prefix-map -Xfrontend $(SRCROOT)=/doris -Xfrontend -coverage-prefix-map -Xfrontend $(SRCROOT)=/doris
    OTHER_CFLAGS: $(inherited) -fdebug-prefix-map=$(SRCROOT)=/doris -ffile-prefix-map=$(SRCROOT)=/doris

packages:
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    from: 1.1.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: 1.4.0
  DorisCore:
    path: packages/DorisCore
  DorisUI:
    path: packages/DorisUI
  DorisMacChrome:
    path: packages/DorisMacChrome

targets:
  Doris-macOS:
    type: application
    platform: macOS
    sources:
      - path: apps/doris-mac/Doris-macOS
        excludes:
          - "Doris-macOS.entitlements"
          - "Resources/Info.plist"
    resources:
      - path: apps/doris-mac/Doris-macOS/AppleScript/Doris.sdef
      - path: apps/doris-mac/Doris-macOS/Resources/Avatar/doris-avatar.png
      - path: apps/doris-mac/Doris-macOS/Resources/Assets.xcassets
    info:
      path: apps/doris-mac/Doris-macOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: Doris
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.productivity
        # Doris is a menu-bar agent — the avatar lives in the notch/menu
        # bar, the dropdown panel is its primary UI, and the main window
        # only opens on demand (via the avatar's right-click menu).
        # `LSUIElement: true` removes the Dock icon and prevents the
        # SwiftUI WindowGroup from auto-creating its window at launch.
        LSUIElement: true
        # Don't carry the main window across relaunches. Even though
        # `LSUIElement: true` blocks auto-window-at-launch, macOS-level
        # state restoration would still rebuild whichever windows were
        # open at last quit. For an agent app that means a stray main
        # window every relaunch — turn it off.
        NSQuitAlwaysKeepsWindows: false
        NSHumanReadableCopyright: ""
        NSAppleScriptEnabled: true
        OSAScriptingDefinition: Doris.sdef
        NSMicrophoneUsageDescription: "Doris listens through the microphone so you can dictate prompts to ChatGPT and other AI apps."
        NSSpeechRecognitionUsageDescription: "Doris uses Apple Speech Recognition to convert your voice to text before sending it to your chosen AI app."
        CFBundleURLTypes:
          - CFBundleURLName: com.gavin.doris.url
            CFBundleURLSchemes: [doris]
        NSUserActivityTypes: []
    settings:
      base:
        # PRODUCT_NAME drives the .app bundle filename, the executable
        # name (Activity Monitor / pgrep), and CFBundleName /
        # CFBundleExecutable in Info.plist. Without this it would
        # default to the Xcode target name ("Doris-macOS"), which the
        # user would see all over their Finder + system UI. Override
        # so they just see "Doris".
        PRODUCT_NAME: Doris
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris
        CODE_SIGN_ENTITLEMENTS: apps/doris-mac/Doris-macOS/Doris-macOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: DorisCore
        product: DorisCore
      - package: DorisUI
        product: DorisUI
      - package: DorisMacChrome
        product: DorisMacChrome
      - package: DynamicNotchKit
      - package: KeyboardShortcuts

  DorisShareExtension-macOS:
    type: app-extension
    platform: macOS
    sources:
      - apps/doris-mac/DorisShareExtension-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris.share-mac
        CODE_SIGN_ENTITLEMENTS: apps/doris-mac/DorisShareExtension-macOS/DorisShareExtension-macOS.entitlements
    info:
      path: apps/doris-mac/DorisShareExtension-macOS/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 5
              NSExtensionActivationSupportsFileWithMaxCount: 5
    dependencies:
      - package: DorisCore
        product: DorisCore

  DorisWidget-macOS:
    type: app-extension
    platform: macOS
    sources:
      - apps/doris-mac/DorisWidget-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris.widget-mac
        CODE_SIGN_ENTITLEMENTS: apps/doris-mac/DorisWidget-macOS/DorisWidget-macOS.entitlements
    info:
      path: apps/doris-mac/DorisWidget-macOS/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: DorisCore
        product: DorisCore
      - package: DorisUI
        product: DorisUI

  Doris-iOS:
    type: application
    platform: iOS
    sources:
      - path: apps/doris-ios/Doris-iOS
        excludes:
          - "Doris-iOS.entitlements"
          - "Resources/Info.plist"
    resources:
      - path: apps/doris-ios/Doris-iOS/Resources/Assets.xcassets
    info:
      path: apps/doris-ios/Doris-iOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: Doris
        LSApplicationCategoryType: public.app-category.productivity
        # `UILaunchScreen` MUST be present (even as an empty dict) for iOS
        # to render the app at the device's native screen size on modern
        # iPhones. Without it, iOS treats the app as legacy and renders
        # it letterboxed in an iPhone-SE-sized box centered in the upper
        # portion of the display — which gave us the "small box, tab bar
        # in the middle" layout. The empty dict says "use the system
        # default plain background".
        UILaunchScreen: {}
        # Portrait only — Doris on iOS is a phone-form-factor productivity
        # viewer; sideways layouts haven't been designed.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        # iOS Doris is a full read/write editor of the iCloud-mirrored
        # store. Silent pushes, background refresh, and local notifications
        # are still Mac-only (the Mac is the event hub); iOS relies on
        # CloudKit's automatic mirror sync + the SyncTimer poke.
        # See `DorisAppDelegate` for the rationale.
    settings:
      base:
        # See the macOS target above for why this is set explicitly:
        # the .app bundle / executable / `CFBundleName` should read as
        # "Doris" everywhere instead of the build target name "Doris-iOS".
        PRODUCT_NAME: Doris
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris.ios
        CODE_SIGN_ENTITLEMENTS: apps/doris-ios/Doris-iOS/Doris-iOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: DorisCore
        product: DorisCore
      - package: DorisUI
        product: DorisUI

  DorisShareExtension-iOS:
    type: app-extension
    platform: iOS
    sources:
      - apps/doris-ios/DorisShareExtension-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris.ios.share
        CODE_SIGN_ENTITLEMENTS: apps/doris-ios/DorisShareExtension-iOS/DorisShareExtension-iOS.entitlements
    info:
      path: apps/doris-ios/DorisShareExtension-iOS/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 5
              NSExtensionActivationSupportsFileWithMaxCount: 5
    dependencies:
      - package: DorisCore
        product: DorisCore

  DorisWidget-iOS:
    type: app-extension
    platform: iOS
    sources:
      - apps/doris-ios/DorisWidget-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris.ios.widget
        CODE_SIGN_ENTITLEMENTS: apps/doris-ios/DorisWidget-iOS/DorisWidget-iOS.entitlements
    info:
      path: apps/doris-ios/DorisWidget-iOS/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: DorisCore
        product: DorisCore
      - package: DorisUI
        product: DorisUI

  DorisIntents-macOS:
    type: app-extension
    platform: macOS
    sources:
      - extensions/DorisIntents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris.intents-mac
        CODE_SIGN_ENTITLEMENTS: extensions/DorisIntents/DorisIntents.entitlements
    info:
      path: extensions/DorisIntents/Info-macOS.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.appintents-extension
    dependencies:
      - package: DorisCore
        product: DorisIPC

  DorisIntents-iOS:
    type: app-extension
    platform: iOS
    sources:
      - extensions/DorisIntents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gavin.doris.intents-ios
        CODE_SIGN_ENTITLEMENTS: extensions/DorisIntents/DorisIntents.entitlements
    info:
      path: extensions/DorisIntents/Info-iOS.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.appintents-extension
    dependencies:
      - package: DorisCore
        product: DorisIPC

schemes:
  Doris-macOS:
    build:
      targets:
        Doris-macOS: all
        DorisShareExtension-macOS: all
        DorisWidget-macOS: all
        DorisIntents-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

  Doris-iOS:
    build:
      targets:
        Doris-iOS: all
        DorisWidget-iOS: all
        DorisIntents-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
